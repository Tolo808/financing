services:
  postgres:
    image: postgres:16-alpine
    container_name: tolo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tolo
      POSTGRES_PASSWORD: tolo
      POSTGRES_DB: tolo
    ports:
      - "5432:5432"
    volumes:
      - tolo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tolo -d tolo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tolo-postgres-data:
